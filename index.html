<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AMP FLOW</title>
    <meta name="apple-mobile-web-app-title" content="AMP">
    <link rel="manifest" href="manifest.json">
    <link rel="AMP-icon" href="icon.png">
    <meta name="AMP-web-app-capable" content="yes">
    <meta name="AMP-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Michroma:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root {
            --edison-bright: #FFD27F;
            --edison-glow: rgba(255, 140, 0, 0.6);
            --edison-dim: #A67C52;
            --bg-gradient: linear-gradient(180deg, #A67C52 0%, #3d220a 25%, #1a1a1a 50%, #0a0a0a 100%);
            --font-header: 'Michroma', sans-serif;
            --font-ogg: "Playfair Display", serif;
            --thumb-size: 14px; 
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: #fff;
            font-family: var(--font-ogg);
            margin: 0;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            position: fixed;
            top: 0; left: 0; width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none; 
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #app-container {
            display: flex;
            width: 200vw;
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
            backface-visibility: hidden;
            background: transparent;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 210, 127, 0.1);
            border-top: 4px solid var(--edison-bright);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px var(--edison-glow);
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #tap-to-start {
            display: none;
            color: var(--edison-bright); font-weight: bold;
            border: 2px solid var(--edison-bright); padding: 15px 30px; border-radius: 30px;
            box-shadow: 0 0 20px var(--edison-glow);
            animation: pulse 1.5s infinite;
            text-align: center;
            cursor: pointer;
            font-family: var(--font-header);
        }

        .player-wrapper {
            flex: 0 0 100vw; 
            width: 100vw;
            padding: 25px 10px 10px 10px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
        }

        header.glass-header { text-align: center; padding: 0 0 10px 0; flex-shrink: 0; }
        .app-title { 
            margin: 0;
            color: var(--edison-bright); font-family: var(--font-ogg);
            font-size: 1.1rem; letter-spacing: 1px; text-shadow: 0 0 12px var(--edison-glow), 0 0 4px var(--edison-bright); 
            white-space: nowrap;
        }

        .info-header { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 5px 0; flex-shrink: 0; }
        .text-fields { width: 100%; height: auto; display: flex; flex-direction: column; align-items: center; gap: 4px; overflow: hidden; }
        .marquee-box { width: 100%; overflow: hidden; white-space: nowrap; text-align: center; min-height: 1.4em; }
        .marquee-inner { display: inline-block; white-space: nowrap; will-change: transform; }
        .scrolling-content { display: inline-block; padding-right: 50px; animation: scroll-slow 15s linear infinite; }
        @keyframes scroll-slow { 0% { transform: translateX(0); } 10% { transform: translateX(0); } 85% { transform: translateX(-50%); } 100% { transform: translateX(-50%); } }
        
        #title-text { font-family: var(--font-ogg); font-weight: bold; font-size: 1.2rem; line-height: 1.2; color: #fff; text-shadow: 0 0 15px var(--edison-glow), 0 0 2px #fff; }
        .artist-row { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        #artist-text { font-family: var(--font-ogg); font-size: 0.9rem; color: var(--edison-bright); line-height: 1.2; text-shadow: 0 0 10px var(--edison-glow); }

        .album-art-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0;
            flex-shrink: 1;
            min-height: 0;
        }
        
        #album-art-wrapper {
            width: 65vw;
            height: 65vw;
            max-width: 250px;
            max-height: 250px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px var(--edison-glow);
            background: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #album-art {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #album-placeholder-icon {
            font-size: 5rem;
            color: #555;
            display: flex;
        }

        .main-controls-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around; 
            align-items: center;
            width: 100%;
            padding: 10px 0; 
        }

        section.container-2 { 
            position: relative;
            width: 90%;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 0; 
        }
        .seek-wrapper { 
            position: relative; width: 100%; height: 4px; display: flex; align-items: center; 
            background: rgba(255, 255, 255, 0.1); border-radius: 2px;
            overflow: visible;
        }
        #seek-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--edison-bright);
            box-shadow: 0 0 10px var(--edison-glow);
            border-radius: 2px;
            width: 0%;
            z-index: 1;
        }
        input[type="range"]#main-seek { -webkit-appearance: none; width: 100%; background: transparent; position: relative; z-index: 5; height: 40px; outline: none; margin: 0; padding: 0; }
        input[type="range"]#main-seek::-webkit-slider-thumb { -webkit-appearance: none; height: var(--thumb-size); width: var(--thumb-size); border-radius: 50%; background: #fff; box-shadow: 0 0 10px #fff, 0 0 15px var(--edison-bright); cursor: pointer; }

        .time-labels {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-family: sans-serif;
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--edison-bright);
            text-shadow: 0 0 8px var(--edison-glow);
            letter-spacing: 0.02em;
        }

        .container-3 { 
            width: 100%;
            display: flex; justify-content: center; align-items: center; 
            gap: 20px; 
            padding: 10px 0; 
        }

        .main-btn { color: var(--edison-bright); background: transparent !important; transition: all 0.2s ease; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; filter: drop-shadow(0 0 8px var(--edison-glow)); }
        .btn-outer { font-size: 1.4rem; opacity: 0.6; } 
        .btn-side { font-size: 2.2rem; }
        .btn-large { font-size: 4rem; filter: drop-shadow(0 0 15px var(--edison-glow)); }
        .main-btn.active { opacity: 1; filter: drop-shadow(0 0 15px var(--edison-glow)) brightness(1.2); }

        .status-action-row { 
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 40px; 
            margin-top: 5px; 
            padding: 15px 0; 
            border-top: 1px solid rgba(255, 210, 127, 0.1);
            box-sizing: border-box;
        }
        
        .btn-status-side {
            height: 44px; border-radius: 0; 
            border: none; background: transparent; 
            color: var(--edison-bright); 
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            flex-shrink: 0;
            filter: drop-shadow(0 0 8px var(--edison-glow));
            font-size: 1.8rem;
        }

        #btn-open-playlist { font-family: var(--font-header); font-size: 1.8rem; letter-spacing: 0.1em; padding: 0 10px; }

        #playlist-overlay { 
            flex: 0 0 100vw; 
            width: 100vw;
            height: 100%; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex; 
            flex-direction: column; 
            padding: 12px; 
            box-sizing: border-box; 
            padding-bottom: env(safe-area-inset-bottom);
            border-left: 1px solid rgba(255, 210, 127, 0.15);
            overflow: hidden;
            font-family: var(--font-ogg);
        }

        #track-list-container { flex: 1; position: relative; overflow: hidden; width: 100%; }
        #track-list { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow-y: auto; list-style: none; padding: 0; margin: 0; -webkit-overflow-scrolling: touch; transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1); will-change: transform; backface-visibility: hidden; }
        #track-list::-webkit-scrollbar { display: none; }
        #track-list { -ms-overflow-style: none; scrollbar-width: none; }

        .playlist-header { display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--edison-bright); padding-bottom: 6px; }
        .playlist-header span { color:var(--edison-bright); font-family:var(--font-ogg); font-size:0.6rem; text-shadow: 0 0 8px var(--edison-glow); }
        #btn-close-list { background:none; border:none; color:var(--edison-bright); font-size: 0.6rem; font-family: var(--font-header); display: flex; align-items: center; justify-content: center; box-shadow: none; padding: 0; margin: 0; cursor: pointer; filter: drop-shadow(0 0 5px var(--edison-glow)); }
        .breadcrumb { font-size: 0.6rem; color: var(--edison-bright); margin: 6px 0; border-bottom: 1px solid rgba(255, 210, 127, 0.1); padding-bottom: 4px; font-family: var(--font-ogg); text-transform: uppercase; }
        
        /* タイトルリスト：新レイアウト */
        .item { border: none; display: flex; align-items: center; padding: 10px 8px; min-height: 60px; box-sizing: border-box; }
        .item.folder { color: var(--edison-bright); font-weight: bold; font-size: 0.9rem; text-shadow: 0 0 5px var(--edison-glow); }
        
        /* サムネイル（左） */
        .track-thumb { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; margin-right: 12px; background: #222; flex-shrink: 0; box-shadow: 0 0 10px var(--edison-glow); }
        .thumb-placeholder { width: 44px; height: 44px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; box-shadow: 0 0 8px var(--edison-glow); color: #666; font-size: 1.2rem; }

        /* テキストエリア（中央） */
        .track-info-mid { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .track-title-row { font-size: 0.95rem; color: #fff; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .track-artist-row { font-size: 0.75rem; color: var(--edison-bright); opacity: 0.9; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ステータスエリア（右） */
        .track-status-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; min-width: 45px; height: 100%; }
        .track-duration { font-size: 0.75rem; color: var(--edison-bright); opacity: 0.8; font-family: sans-serif; }
        .playing-indicator { font-size: 1rem; color: var(--edison-bright); filter: drop-shadow(0 0 5px var(--edison-glow)); margin-top: 4px; visibility: hidden; }
        .item.active .playing-indicator { visibility: visible; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner" id="loading-spinner"></div>
    <div id="tap-to-start">READY</div>
</div>

<div id="app-container">
    <div class="player-wrapper">
        <section class="info-header">
            <header class="glass-header"><h1 class="app-title">AMP FLOW</h1></header>

            <div class="album-art-container">
                <div id="album-art-wrapper">
                    <i id="album-placeholder-icon" class="ri-music-2-line"></i>
                    <img id="album-art" alt="Album Art">
                </div>
            </div>

            <div class="text-fields">
                <div class="marquee-box" id="title-box"><div id="title-inner" class="marquee-inner"><span id="title-text">SELECT TRACK</span></div></div>
                <div class="artist-row">
                    <div class="marquee-box" id="artist-box"><div id="artist-inner" class="marquee-inner"><span id="artist-text">UNKNOWN ARTIST</span></div></div>
                </div>
            </div>
        </section>

        <div class="main-controls-container">
            <section class="container-2">
                <div class="seek-wrapper" id="seek-wrapper">
                    <div id="seek-progress"></div>
                    <input type="range" id="main-seek" min="0" max="100" value="0" step="0.1">
                </div>
                <div class="time-labels">
                    <span id="current-time">00:00</span>
                    <span id="total-time">00:00</span>
                </div>
            </section>
            
            <section class="container-3">
                <button class="main-btn btn-outer" id="btn-shuffle"><i class="ri-shuffle-line"></i></button>
                <button class="main-btn btn-side" id="btn-prev"><i class="ri-skip-back-fill"></i></button>
                <button class="main-btn btn-large" id="btn-play"><i class="ri-play-fill" id="play-icon"></i></button>
                <button class="main-btn btn-side" id="btn-next"><i class="ri-skip-forward-fill"></i></button>
                <button class="main-btn btn-outer" id="btn-repeat"><i class="ri-repeat-line"></i></button>
            </section>

            <div class="status-action-row">
                <button class="btn-status-side" id="btn-folder-scan" style="position:relative;">
                    <i class="ri-folder-open-line"></i>
                    <input type="file" id="folder-input" webkitdirectory directory multiple style="position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer;">
                </button>
                <button class="btn-status-side" id="btn-open-playlist"><i class="ri-play-list-fill"></i></button>
            </div>
        </div>
    </div>

    <div id="playlist-overlay">
        <div class="playlist-header">
            <span>MUSIC PLAYLIST</span>
            <button id="btn-close-list">CLOSE</button>
        </div>
        <div id="breadcrumb" class="breadcrumb">ROOT /</div>
        <div id="track-list-container">
            <ul id="track-list"></ul>
        </div>
    </div>
</div>

<audio id="audio" preload="auto"></audio>

<script>
    const audio = document.getElementById('audio');
    const seek = document.getElementById('main-seek');
    const seekProgress = document.getElementById('seek-progress');
    const playIcon = document.getElementById('play-icon');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingSpinner = document.getElementById('loading-spinner');
    const tapToStart = document.getElementById('tap-to-start');
    const currentTimeDisplay = document.getElementById('current-time');
    const totalTimeDisplay = document.getElementById('total-time');
    const appContainer = document.getElementById('app-container');
    const trackList = document.getElementById('track-list');
    const albumArt = document.getElementById('album-art');
    const albumPlaceholder = document.getElementById('album-placeholder-icon');
    const btnShuffle = document.getElementById('btn-shuffle');
    const btnRepeat = document.getElementById('btn-repeat');

    let isDragging = false;
    let currentObjectUrl = null;
    let allFiles = [], currentPath = [];
    let currentTrackIndex = -1;
    let currentFilteredTracks = []; 
    let playbackOrder = []; 
    let userHasStarted = false;
    let isShuffle = false;
    let isRepeat = false;

    function navigateTo(page) {
        appContainer.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
        appContainer.style.transform = `translateX(${page === 0 ? 0 : -50}%)`;
    }

    document.getElementById('btn-open-playlist').onclick = () => navigateTo(1);
    document.getElementById('btn-close-list').onclick = () => navigateTo(0);

    document.getElementById('folder-input').onchange = (e) => {
        allFiles = [];
        for (let f of e.target.files) {
            if (f.type.startsWith('audio/') || f.name.match(/\.(mp3|m4a|wav)$/i)) {
                allFiles.push({ name: f.name, path: f.webkitRelativePath.split('/'), file: f });
            }
        }
        currentPath = [];
        renderList();
        navigateTo(1);
    };

    function renderList() {
        trackList.innerHTML = '';
        document.getElementById('breadcrumb').innerText = "ROOT / " + currentPath.join(' / ').toUpperCase();
        if (currentPath.length > 0) {
            const up = document.createElement('li'); up.className = 'item folder'; up.innerText = `.. (BACK)`;
            up.onclick = () => { currentPath.pop(); renderList(); }; trackList.appendChild(up);
        }
        const dirs = new Set(); 
        const folderTracks = [];
        
        allFiles.forEach(f => {
            if (currentPath.every((p, i) => f.path[i] === p)) {
                const next = f.path[currentPath.length];
                if (f.path.length === currentPath.length + 1) folderTracks.push(f); else if (next) dirs.add(next);
            }
        });

        dirs.forEach(d => {
            const li = document.createElement('li'); li.className = 'item folder'; li.innerText = d.toUpperCase();
            li.onclick = () => { currentPath.push(d); renderList(); }; trackList.appendChild(li);
        });

        folderTracks.forEach((f, idx) => {
            const li = document.createElement('li');
            li.className = 'item track' + (currentFilteredTracks[playbackOrder[currentTrackIndex]]?.file === f.file ? ' active' : '');
            
            li.innerHTML = `
                <div class="thumb-placeholder"><i class="ri-music-2-line"></i></div>
                <div class="track-info-mid">
                    <span class="track-title-row">${f.name.replace(/\.[^/.]+$/, "")}</span>
                    <span class="track-artist-row">Unknown Artist</span>
                </div>
                <div class="track-status-right">
                    <span class="track-duration">--:--</span>
                    <i class="ri-equalizer-fill playing-indicator"></i>
                </div>
            `;

            // メタデータ読み込み（非同期）
            window.jsmediatags.read(f.file, {
                onSuccess: (tag) => {
                    const title = tag.tags.title || f.name.replace(/\.[^/.]+$/, "");
                    const artist = tag.tags.artist || "Unknown Artist";
                    li.querySelector('.track-title-row').innerText = title;
                    li.querySelector('.track-artist-row').innerText = artist;
                    if (tag.tags.picture) {
                        const { data, format } = tag.tags.picture;
                        let b64 = ""; for (let i = 0; i < data.length; i++) b64 += String.fromCharCode(data[i]);
                        const thumb = document.createElement('img');
                        thumb.className = 'track-thumb';
                        thumb.src = `data:${format};base64,${window.btoa(b64)}`;
                        const placeholder = li.querySelector('.thumb-placeholder');
                        if (placeholder) placeholder.replaceWith(thumb);
                    }
                }
            });

            // 簡易的な時間取得
            const tempAudio = new Audio();
            tempAudio.src = URL.createObjectURL(f.file);
            tempAudio.onloadedmetadata = () => {
                li.querySelector('.track-duration').innerText = formatTime(tempAudio.duration);
                URL.revokeObjectURL(tempAudio.src);
            };

            li.onclick = () => { 
                currentFilteredTracks = [...folderTracks]; 
                initPlaybackOrder(idx); 
                loadTrack(currentFilteredTracks[playbackOrder[0]].file); 
                renderList(); // アクティブ表示更新用
                navigateTo(0); 
            };
            trackList.appendChild(li);
        });
    }

    function initPlaybackOrder(startIndex = 0) {
        playbackOrder = Array.from(currentFilteredTracks.keys());
        if (isShuffle) {
            for (let i = playbackOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [playbackOrder[i], playbackOrder[j]] = [playbackOrder[j], playbackOrder[i]];
            }
            if (startIndex !== -1) {
                const currentInShuffle = playbackOrder.indexOf(startIndex);
                [playbackOrder[0], playbackOrder[currentInShuffle]] = [playbackOrder[currentInShuffle], playbackOrder[0]];
            }
        } else if (startIndex !== -1) {
            const head = playbackOrder.splice(startIndex);
            playbackOrder = head.concat(playbackOrder);
        }
        currentTrackIndex = 0;
    }

    function loadTrack(file) {
        if (!userHasStarted) {
            loadingOverlay.style.display = 'flex';
            loadingSpinner.style.display = 'none';
            tapToStart.style.display = 'block';
        }
        audio.pause();
        if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
        currentObjectUrl = URL.createObjectURL(file);
        audio.src = currentObjectUrl;
        
        albumArt.style.display = 'none';
        albumPlaceholder.style.display = 'flex';

        window.jsmediatags.read(file, {
            onSuccess: (tag) => {
                document.getElementById('title-text').innerText = tag.tags.title || file.name;
                document.getElementById('artist-text').innerText = tag.tags.artist || "UNKNOWN ARTIST";
                if (tag.tags.picture) {
                    const { data, format } = tag.tags.picture;
                    let b64 = ""; for (let i = 0; i < data.length; i++) b64 += String.fromCharCode(data[i]);
                    albumArt.src = `data:${format};base64,${window.btoa(b64)}`;
                    albumArt.style.display = 'block';
                    albumPlaceholder.style.display = 'none';
                }
                updateMarquee('title-box', 'title-inner'); updateMarquee('artist-box', 'artist-inner');
            },
            onError: () => {
                document.getElementById('title-text').innerText = file.name;
                document.getElementById('artist-text').innerText = "UNKNOWN ARTIST";
                updateMarquee('title-box', 'title-inner'); updateMarquee('artist-box', 'artist-inner');
            }
        });
        if (userHasStarted) {
            audio.play().then(() => { playIcon.className = 'ri-pause-fill'; });
        }
    }

    function updateMarquee(boxId, innerId) {
        const inner = document.getElementById(innerId), box = document.getElementById(boxId);
        inner.classList.remove('scrolling-content');
        if (inner.scrollWidth > box.clientWidth + 2) inner.classList.add('scrolling-content');
    }

    tapToStart.onclick = () => { userHasStarted = true; loadingOverlay.style.display = 'none'; audio.play(); playIcon.className = 'ri-pause-fill'; };

    btnShuffle.onclick = () => {
        isShuffle = !isShuffle;
        btnShuffle.classList.toggle('active', isShuffle);
        if (currentFilteredTracks.length > 0) {
            const currentOriginalIdx = playbackOrder[currentTrackIndex];
            initPlaybackOrder(currentOriginalIdx);
        }
    };

    btnRepeat.onclick = () => {
        isRepeat = !isRepeat;
        btnRepeat.classList.toggle('active', isRepeat);
    };

    function formatTime(s) { if (isNaN(s)) return "00:00"; const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`; }
    
    document.getElementById('btn-play').onclick = () => { 
        if (audio.paused) { audio.play(); playIcon.className = 'ri-pause-fill'; } 
        else { audio.pause(); playIcon.className = 'ri-play-fill'; } 
    };

    document.getElementById('btn-prev').onclick = () => {
        if (audio.currentTime > 3) { audio.currentTime = 0; return; }
        if (currentTrackIndex > 0) {
            currentTrackIndex--;
            loadTrack(currentFilteredTracks[playbackOrder[currentTrackIndex]].file);
            renderList();
        } else if (isShuffle || isRepeat) { 
            currentTrackIndex = playbackOrder.length - 1;
            loadTrack(currentFilteredTracks[playbackOrder[currentTrackIndex]].file);
            renderList();
        }
    };

    document.getElementById('btn-next').onclick = () => {
        if (currentTrackIndex < playbackOrder.length - 1) {
            currentTrackIndex++;
            loadTrack(currentFilteredTracks[playbackOrder[currentTrackIndex]].file);
            renderList();
        } else if (isShuffle || isRepeat) { 
            currentTrackIndex = 0;
            if (isShuffle) initPlaybackOrder(playbackOrder[playbackOrder.length-1]);
            loadTrack(currentFilteredTracks[playbackOrder[currentTrackIndex]].file);
            renderList();
        }
    };

    audio.onended = () => {
        if (isRepeat && !isShuffle) {
            audio.currentTime = 0;
            audio.play();
        } else {
            document.getElementById('btn-next').click();
        }
    };

    function updateFrame() {
        if (audio.duration && !isDragging) {
            const progress = (audio.currentTime / audio.duration) * 100;
            seek.value = progress;
            seekProgress.style.width = progress + '%';
            currentTimeDisplay.innerText = formatTime(audio.currentTime);
            totalTimeDisplay.innerText = formatTime(audio.duration);
        }
        requestAnimationFrame(updateFrame);
    }
    requestAnimationFrame(updateFrame);

    seek.oninput = (e) => { 
        isDragging = true; 
        const val = parseFloat(e.target.value);
        seekProgress.style.width = val + '%';
        audio.currentTime = (val / 100) * audio.duration; 
    };
    seek.onchange = () => isDragging = false;
</script>
</body>
</html>
